<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wednesday Mysterie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-live="polite">
    <section class="screen" id="screen">
      <img class="scene-image" id="sceneImage" src="" alt="">
      <img class="animation-image" id="animationImage" src="" alt="" aria-hidden="true">
      <div class="missing-image" id="missingImage" hidden>
        <span id="missingImageName"></span>
      </div>

      <div class="vignette" aria-hidden="true"></div>
      <div class="ar-overlay" id="arOverlay" hidden aria-hidden="true"></div>

      <button class="back-button" id="backButton" type="button">Terug</button>
      <p class="inventory" id="inventory">Vingers gevonden: 0/5</p>

      <p class="message" id="message" hidden></p>
      <div class="finger-cover" id="fingerCover" aria-hidden="true"></div>
      <div class="collect-effect" id="collectEffect" aria-hidden="true"></div>

      <div class="hotspots" id="hotspots"></div>
      <div class="actions" id="actions"></div>

      <div class="pc-ar-panel" id="pcArPanel" hidden>
        <div class="pc-ar-dialog" role="dialog" aria-modal="true" aria-labelledby="pcArTitle">
          <button class="pc-ar-close" id="pcArClose" type="button" aria-label="Sluit AR-paneel">×</button>
          <div class="pc-ar-copy">
            <h2 id="pcArTitle">AR Boek</h2>
            <p>Scan deze QR met je telefoon. Start AR en richt je telefoon daarna op het boek hiernaast.</p>
            <img class="pc-ar-qr" id="pcArQr" src="" alt="QR-code naar de AR-scanner">
            <a class="pc-ar-link" id="pcArLink" href="ar.html?scanner=1" target="_blank" rel="noreferrer">Open AR-link</a>
          </div>
          <img class="pc-ar-target" src="assets/ar/book-scan-marker.png" alt="Scanmarker van het vergrendelde boek">
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
