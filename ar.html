<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AR Boek</title>
  <link rel="stylesheet" href="ar.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <main class="ar-page">
    <div class="ar-scene" id="sceneMount"></div>

    <section class="ar-start" id="startPanel">
      <img src="assets/ar/book-target.png" alt="Het boek dat gescand moet worden" class="target-preview">
      <h1>AR Boek</h1>
      <p>Richt je camera op deze boekpagina. Daarna verschijnt de aanwijzing in beeld.</p>
      <button type="button" id="startButton">Start AR</button>
      <p class="status" id="statusText"></p>
    </section>

    <p class="scan-note" id="scanNote" hidden>Richt je camera op het boek.</p>
    <button class="exit-ar" type="button" id="exitButton">Verlaat AR</button>
  </main>

  <script type="module" src="ar.js"></script>
</body>
</html>
